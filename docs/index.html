<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life in the UK App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            line-height: 1.7;
            color: #1a1a2e;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            text-align: center;
            background: #fff;
            padding: 48px 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        h1 { font-size: 28px; margin-bottom: 8px; }
        .subtitle { color: #666; margin-bottom: 32px; font-size: 16px; }
        .links { display: flex; flex-direction: column; gap: 12px; }
        a {
            display: block;
            padding: 14px 24px;
            background: #4f46e5;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: background 0.2s;
        }
        a:hover { background: #4338ca; }
        a.secondary { background: #e5e7eb; color: #1a1a2e; }
        a.secondary:hover { background: #d1d5db; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Life in the UK</h1>
        <p class="subtitle">Practice app for the Life in the UK test</p>
        <div class="links">
            <a href="privacy-policy.html">Privacy Policy</a>
            <a href="terms-of-service.html" class="secondary">Terms of Service</a>
            <a href="delete-account.html" class="secondary">Delete Account</a>
            <a href="mailto:ateeq.pirzada01@gmail.com" class="secondary">Contact Us</a>
        </div>
    </div>
</body>
</html>
