<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feature Graphic - Life in the UK Test 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #222;
        }
        /*
          Feature graphic: exactly 1024x500px.
          Open in Chrome → F12 → Ctrl+Shift+M → set 1024x500 →
          Ctrl+Shift+P → "Capture screenshot"
        */
        .banner {
            width: 1024px;
            height: 500px;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d1b69 50%, #4f46e5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 48px;
            padding: 40px 60px;
            position: relative;
            overflow: hidden;
        }
        .banner::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        .banner::after {
            content: '';
            position: absolute;
            bottom: -80px;
            left: -80px;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
        }
        .icon-area {
            flex-shrink: 0;
            width: 180px;
            height: 180px;
            border-radius: 36px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            z-index: 1;
        }
        .icon-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .text-area {
            z-index: 1;
            color: #fff;
        }
        .text-area h1 {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 52px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 12px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .text-area h1 span {
            color: #a5b4fc;
        }
        .text-area p {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 22px;
            font-weight: 400;
            opacity: 0.9;
            line-height: 1.4;
            text-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
        .badges {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .badge {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 13px;
            font-weight: 600;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="banner">
        <div class="icon-area">
            <img src="../assets/images/icon.png" alt="Life in the UK App Icon">
        </div>
        <div class="text-area">
            <h1>Life in the UK<br>Test <span>2026</span></h1>
            <p>Quizzes, Mock Exams & Flashcards<br>to help you pass first time</p>
            <div class="badges">
                <span class="badge">1000+ Questions</span>
                <span class="badge">100 Practice Tests</span>
                <span class="badge">Works Offline</span>
            </div>
        </div>
    </div>
</body>
</html>
